services:
  - type: web
    name: havenzen
    runtime: docker
    plan: free
    healthCheckPath: /health.php
    autoDeploy: true
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GPS_TRACKING_API_KEY
        generateValue: true
      - key: THERMAL_PRINTER_NAME
        value: Xprinter XP-58IIH
